name: Post to Telegram

on:
  schedule:
    # 09:00 и 18:00 по МСК (06:00 и 15:00 UTC)
    - cron: '0 6 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Post joke to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python post_to_telegram.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_jokes.json
          git commit -m "Update posted jokes tracker" || echo "No changes"
          git push
