name: Update Jokes

on:
  schedule:
    # Каждый день в 03:00 UTC (06:00 по МСК)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update jokes.json
        run: python update_jokes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add jokes.json all_jokes.json
          git commit -m "Update jokes for $(date -u +%Y-%m-%d)" || echo "No changes"
          git push

      - name: Upload jokes.json to Yandex Object Storage
        if: ${{ secrets.YC_ACCESS_KEY_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: |
          aws --endpoint-url=https://storage.yandexcloud.net s3 cp jokes.json s3://anekdoty-jokes/jokes.json --acl public-read
